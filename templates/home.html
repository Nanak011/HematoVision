<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HematoVision - Blood Cell Classifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 40px;
            width: 480px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 35px;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-area:hover {
            border-color: #000000;
            background: rgba(0, 0, 0, 0.05);
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .upload-text {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 15px;
        }

        input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        #preview-container {
            display: none;
            margin-top: 15px;
        }

        #preview-container img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #211d1e;
        }

        #file-name {
            font-size: 13px;
            color: #211d1e;
            margin-top: 8px;
        }

        .predict-btn {
            background: linear-gradient(135deg, #1d1d1d, #212121);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .predict-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(48, 47, 47, 0.4);
        }

        .predict-btn:active {
            transform: translateY(0);
        }

        .cell-types {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .cell-tag {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔬</div>
        <h1>HematoVision</h1>
        <p class="subtitle">AI-Powered Blood Cell Classification</p>

        <form action="/predict" method="POST" enctype="multipart/form-data">
            <div class="upload-area" id="upload-area">
                <div class="upload-icon">📂</div>
                <p class="upload-text">Click to upload a blood cell image<br><small>Supports JPG, PNG, JPEG</small></p>
                <input type="file" name="image" id="file-input" accept="image/*" required>
            </div>

            <div id="preview-container">
                <img id="preview-img" src="#" alt="Preview">
                <p id="file-name"></p>
            </div>

            <br>
            <button type="submit" class="predict-btn">🔍 PREDICT</button>
        </form>

        <div class="cell-types">
            <span class="cell-tag">Eosinophil</span>
            <span class="cell-tag">Lymphocyte</span>
            <span class="cell-tag">Monocyte</span>
            <span class="cell-tag">Neutrophil</span>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('preview-img');
        const fileName = document.getElementById('file-name');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewContainer.style.display = 'block';
                    fileName.textContent = fileInput.files[0].name;
                };
                reader.readAsDataURL(this.files[0]);
            }
        });
    </script>
</body>
</html>
